<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gushwork Assignment</title>

    <link rel="stylesheet" href="styles.css" />
</head>

<body>

    <header id="header">

        <div class="top-bar">
            <p>🔥 Free shipping on all orders above ₹999</p>
        </div>

        <nav class="navbar">

            <div class="logo">⚡UNIK<span>.</span></div>

            <ul class="nav-links">
                <li>Home</li>
                <li>Products</li>
                <li>About</li>
                <li>Contact</li>
            </ul>

            <button class="cta-btn">Sign In</button>

        </nav>
    </header>

    <section class="hero">

        <div class="hero-content">

            <div class="hero-text">
                <h1>Shop Smarter with NovaKart</h1>

                <p>
                    Discover premium products designed for modern lifestyles. Built with performance, simplicity, and
                    style in mind.
                </p>

                <button class="cta-btn">Get Started</button>
            </div>

            <div class="hero-image">
                <img src="https://picsum.photos/500/400" alt="Hero Image">
            </div>

        </div>

    </section>

    <section class="carousel-section">

        <h2>Featured Products</h2>

        <div class="carousel-wrapper">

            <button class="btn prev">&#10094;</button>

            <div class="carousel" id="carousel">

                <div class="card">
                    <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=500" />
                </div>

                <div class="card">
                    <img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?w=500" />
                </div>

                <div class="card">
                    <img src="https://images.unsplash.com/photo-1517336714731-489689fd1ca8?w=500" />
                </div>

                <div class="card">
                    <img src="https://images.unsplash.com/photo-1491553895911-0055eca6402d?w=500" />
                </div>

            </div>

            <button class="btn next">&#10095;</button>

        </div>

    </section>

    <script src="script.js"></script>
</body>

</html>
